name: Rule Evolution Pipeline

on:
  push:
    paths:
      - 'error-logs/**'
    branches:
      - main
      - master
  pull_request:
    paths:
      - 'error-lobs/**'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Error threshold for rule generation'
        required: false
        default: '5'

jobs:
  analyze:
    name: Analyze Error Logs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Analyze error logs
        id: analysis
        run: |
          python -m rule_evolution.cli analyze \
            --logs-dir error-logs \
            --threshold ${{ github.event.inputs.threshold || '5' }} \
            --output analysis-result.json \
            --verbose

      - name: Generate candidate rules
        if: steps.analysis.outputs.candidate_count > 0
        run: |
          python -m rule_evolution.cli generate \
            --input analysis-result.json

      - name: Check database changes
        id: db_changes
        run: |
          if [ -f rules/rule_database.json ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request for new rules
        if: steps.db_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto-generate rules from error analysis'
          title: '🤖 Auto-generated Rules from Error Analysis'
          body: |
            ## Summary

            This PR was automatically generated by the Rule Evolution Pipeline.

            ### Changes

            - Analyzed error logs from `error-logs/`
            - Generated candidate rules for errors exceeding threshold
            - Updated rule database with new/updated rules

            ### Next Steps

            - Review the generated rules in `rules/candidates/`
            - Approve rules to promote to `rules/global/`
            - Use `opencode-evolve db status <rule-id> global` to approve

            ---
            *Generated by GitHub Actions*
          branch: auto/rules-evolution
          delete-branch: true

      - name: No changes detected
        if: steps.db_changes.outputs.changes == 'false'
        run: echo "No rule changes detected"

  report:
    name: Generate Report
    needs: analyze
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate rules report
        run: |
          python -m rule_evolution.cli report

      - name: Post to GitHub
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body = '### Rule Evolution Report\n\n';
            
            if (fs.existsSync('rules/rule_database.json')) {
              const db = JSON.parse(fs.readFileSync('rules/rule_database.json', 'utf8'));
              body += `**Total Rules:** ${db.statistics.total_rules}\n`;
              body += `- Candidate: ${db.statistics.candidate_rules}\n`;
              body += `- Global: ${db.statistics.global_rules}\n`;
              body += `- Deprecated: ${db.statistics.deprecated_rules}\n`;
              body += `- Stale: ${db.statistics.stale_rules}\n`;
            } else {
              body += 'No rules in database yet.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
